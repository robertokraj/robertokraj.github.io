<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Display</title>
<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: white;
  color: black;
  text-align: center;
}

#text {
  width: 95%;
  font-family: sans-serif;
  font-size: clamp(18px, 6vw, 120px);
  word-wrap: break-word;
}
</style>
</head>

<body>
<div id="text">Ładowanie...</div>

<script>
const URL = "https://docs.google.com/spreadsheets/d/1NjBDYlIYx4wzoEQQFxF8L7HH5PoBzBPQtetKUcZrmmQ/export?format=csv";

async function load() {
  try {
    const res = await fetch(URL);
    const data = await res.text();

    let firstCell = data.split("\n")[0].split(",")[0];
    firstCell = firstCell.replace(/"/g, ""); // usuwa WSZYSTKIE cudzysłowy

    document.getElementById("text").innerText = firstCell;
  } catch (e) {
    document.getElementById("text").innerText = "Brak danych";
  }
}

load();
setInterval(load, 30000);
</script>

</body>
</html>
